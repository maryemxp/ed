<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduLife AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">

  <h1>EduLife AI 🧠✨</h1>
  <p>Select your world</p>

  <button onclick="openSection('health')">💙 Health</button>
  <button onclick="openSection('study')">📚 Study</button>
  <button onclick="openSection('fun')">🎮 Fun</button>

</div>

<!-- HEALTH -->
<div id="health" class="screen">

  <button class="back" onclick="backHome()">⬅ Back</button>

  <h2>Health AI 💙</h2>

  <input id="sleep" placeholder="Sleep hours">
  <input id="work" placeholder="Study/Work hours">
  <input id="stress" placeholder="Do you feel stress? (yes/no)">
  <textarea id="problem" placeholder="Describe your problem"></textarea>

  <button onclick="healthAI()">Analyze AI</button>

  <p id="healthResult"></p>

  <h3>Daily Tasks 🏆</h3>

  <label><input type="checkbox" onchange="checkHealthTasks()"> Drink Water</label><br>
  <label><input type="checkbox" onchange="checkHealthTasks()"> Sleep 8 Hours</label><br>
  <label><input type="checkbox" onchange="checkHealthTasks()"> Read 1 Page</label><br>

  <p id="healthCongrats"></p>

</div>

<!-- STUDY -->
<div id="study" class="screen">

  <button class="back" onclick="backHome()">⬅ Back</button>

  <h2>Study Zone 📚</h2>

  <button onclick="startTimer()">Start Pomodoro</button>
  <p id="timer"></p>

  <hr>

  <h3>Math Challenge 🔢</h3>
  <p id="question"></p>
  <input id="answer">
  <button onclick="checkMath()">Check</button>

  <hr>

  <h3>World Info 🌍</h3>
  <select onchange="countryInfo(this.value)">
    <option value="">Select Country</option>
    <option value="morocco">Morocco</option>
    <option value="france">France</option>
    <option value="japan">Japan</option>
  </select>

  <p id="countryText"></p>

</div>

<!-- FUN -->
<div id="fun" class="screen">

  <button class="back" onclick="backHome()">⬅ Back</button>

  <h2>Fun Zone 🎮</h2>

  <canvas id="board"></canvas>
  <br>
  <button onclick="clearBoard()">Clear</button>

  <hr>

  <h3>Word Builder 🔤</h3>
  <p id="letters"></p>
  <input id="word">
  <button onclick="checkWord()">Check Word</button>
  <p id="wordResult"></p>

</div>

<script src="script.js"></script>
</body>
</html>
