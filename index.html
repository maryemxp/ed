<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduWell AI Supreme</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glass">

  <header>
    <h1>EduWell AI ⚡</h1>
    <p>AI Health • Learning • Motivation</p>

    <div class="stats">
      XP: <span id="xp">0</span> | Level: <span id="level">1</span>
    </div>
  </header>

  <!-- 😴 SLEEP -->
  <section class="card sleep">
    <h2>😴 Sleep Motivation</h2>
    <button onclick="sleepMotivation()">Check Sleep</button>
    <button onclick="downloadSleep()">Download</button>
    <p id="sleepMsg"></p>
  </section>

  <!-- 📚 AI -->
  <section class="card ai">
    <h2>📚 AI Lesson Explainer</h2>
    <input id="lessonInput" placeholder="Write any lesson">
    <button onclick="generateSummary()">Generate AI</button>
    <button onclick="downloadSummary()">Download</button>
    <p id="summaryResult"></p>
  </section>

  <!-- 🥗 FOOD -->
  <section class="card food">
    <h2>🥗 Food AI</h2>
    <input id="foodInput" placeholder="Enter food">
    <button onclick="checkFood()">Analyze</button>
    <button onclick="downloadFood()">Download</button>
    <p id="foodResult"></p>
  </section>

  <!-- 🏆 CHALLENGES -->
  <section class="card challenge">
    <h2>🏆 Challenges</h2>

    <label><input type="checkbox" onchange="checkDone()"> Drink Water</label><br>
    <label><input type="checkbox" onchange="checkDone()"> Sleep Early</label><br>
    <label><input type="checkbox" onchange="checkDone()"> Exercise</label>

    <p id="congrats"></p>

    <button onclick="downloadChallenge()">Download Progress</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
